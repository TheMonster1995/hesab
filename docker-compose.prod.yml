# Production overlay. Adds a Caddy reverse proxy with automatic HTTPS in front of
# the web container. Use together with the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Requires DOMAIN set in .env (e.g. DOMAIN=hesab.example.com) and that domain's
# DNS A record pointing at this VPS. Ports 8080/4000 from the base file are only
# reachable if your firewall allows them — keep them closed and expose only 80/443.
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:

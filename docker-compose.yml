services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hesab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hesab}
      POSTGRES_DB: ${POSTGRES_DB:-hesab}
    volumes:
      - hesab_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hesab}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hesab}:${POSTGRES_PASSWORD:-hesab}@db:5432/${POSTGRES_DB:-hesab}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me}
      PORT: "4000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-4001}:4000"

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  hesab_db:
